<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#F4F4EE"/>
  <!-- Black card (back) -->
  <rect x="8" y="10" width="30" height="40" rx="5" fill="#111111" stroke="#111111" stroke-width="2" transform="rotate(-8 23 30)"/>
  <rect x="14" y="17" width="18" height="3" rx="1" fill="#ffffff" opacity="0.7"/>
  <rect x="14" y="23" width="12" height="3" rx="1" fill="#ffffff" opacity="0.4"/>
  <!-- White card (front) -->
  <rect x="24" y="12" width="30" height="40" rx="5" fill="#ffffff" stroke="#111111" stroke-width="3" transform="rotate(6 39 32)"/>
  <rect x="30" y="20" width="18" height="3" rx="1" fill="#111111" opacity="0.7"/>
  <rect x="30" y="26" width="10" height="3" rx="1" fill="#111111" opacity="0.4"/>
  <!-- Green accent dot -->
  <circle cx="52" cy="12" r="8" fill="#66FF00" stroke="#111111" stroke-width="2.5"/>
  <text x="52" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#111111">SV</text>
</svg>
